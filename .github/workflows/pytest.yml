name: Pytest API Testing with Allure Report

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (required for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.33.0
          wget -q https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          sudo tar -xzf allure-${ALLURE_VERSION}.tgz -C /opt/
          sudo ln -s /opt/allure-${ALLURE_VERSION}/bin/allure /usr/local/bin/allure
          allure --version

      - name: Run regression tests
        run: ENV=dev pytest
        continue-on-error: true

      - name: Fetch history from gh-pages
        if: always()
        continue-on-error: true
        run: |
          git fetch origin gh-pages 2>/dev/null || echo "No gh-pages branch yet (first run)"
          # Copy old history into allure-results so Allure can build trends
          if git rev-parse origin/gh-pages > /dev/null 2>&1; then
            git archive origin/gh-pages history/ | tar -x -C allure-results/ 2>/dev/null || echo "No history dir in gh-pages"
            echo "History loaded from gh-pages"
          fi

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          DEPLOY_DIR=$(mktemp -d)
          cp -r allure-report/* "$DEPLOY_DIR/"

          cd "$DEPLOY_DIR"
          git init
          git checkout -b gh-pages
          git add --all
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "Update Allure test report" || echo "Nothing to commit"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin gh-pages

      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-test-report
          path: allure-report
          retention-days: 30
