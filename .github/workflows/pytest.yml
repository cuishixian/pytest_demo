name: Pytest API Testing

on:
  push:
    branches: [ "master" ]          # 改为 master，与您的分支一致
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  Pytest-API-Testing:               # 修正拼写

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4     # 升级到 v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5 # 升级到 v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test with pytest
      run: |
        ENV=dev pytest tests/ --html=report.html --self-contained-html

    - name: Upload Pytest report
      uses: actions/upload-artifact@v4  # 升级到 v4
      with:
        name: Pytest-test-report
        path: report.html               # 上传 html 报告，而不是 allure-results